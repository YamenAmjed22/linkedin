<section class="section contact">
    <h2 class="section-title animate-on-scroll">Get In <span>Touch</span></h2>

    <div class="contact-wrapper animate-on-scroll">
        <div class="contact-info glass-panel">
            <h3>Let's talk about everything!</h3>
            <p>Whether you have a question or just want to say hi, I'll try my best to get back to you!</p>

            <div class="info-items">
                <div class="info-item">
                    <div class="icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z">
                            </path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                    </div>
                    <div class="text">
                        <span>Email</span>
                        <a href="mailto:yamenamjed22&#64;gmail.com">yamenamjed22&#64;gmail.com</a>
                    </div>
                </div>

                <div class="info-item">
                    <div class="icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z">
                            </path>
                        </svg>
                    </div>
                    <div class="text">
                        <span>Phone</span>
                        <a href="tel:+962777777777">+962 7X XXX XXXX</a>
                    </div>
                </div>

                <div class="info-item">
                    <div class="icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                            <circle cx="12" cy="10" r="3"></circle>
                        </svg>
                    </div>
                    <div class="text">
                        <span>Location</span>
                        <p>Amman, Jordan</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Contact Form -->
        <div class="contact-form glass-panel">
            <form (ngSubmit)="onSubmit()" #contactForm="ngForm">
                <div class="input-group">
                    <input type="text" id="name" name="name" [(ngModel)]="model.name" required #name="ngModel"
                        [class.invalid]="name.invalid && name.touched">
                    <label for="name">Your Name</label>
                </div>

                <div class="input-group">
                    <input type="email" id="email" name="email" [(ngModel)]="model.email" required email
                        #email="ngModel" [class.invalid]="email.invalid && email.touched">
                    <label for="email">Your Email</label>
                </div>

                <div class="input-group full-width">
                    <input type="text" id="subject" name="subject" [(ngModel)]="model.subject" required
                        #subject="ngModel" [class.invalid]="subject.invalid && subject.touched">
                    <label for="subject">Subject</label>
                </div>

                <div class="input-group full-width">
                    <textarea id="message" name="message" rows="5" [(ngModel)]="model.message" required
                        #message="ngModel" [class.invalid]="message.invalid && message.touched"></textarea>
                    <label for="message">Message</label>
                </div>

                <button type="submit" class="btn btn-primary submit-btn" [disabled]="contactForm.invalid">
                    <span class="btn-text" *ngIf="!isSubmitting">Send Message</span>
                    <span class="loader" *ngIf="isSubmitting"></span>
                </button>

                <div class="alert success-alert fade-in" *ngIf="submittedSuccess">
                    Your message has been sent successfully!
                </div>
            </form>
        </div>
    </div>
</section>
